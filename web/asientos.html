<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinerama | Seleccionar Asientos</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="shortcut icon" href="assets/img/C_ine.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="container my-5">
        <section class="seat-selection">
            <div class="row mb-4">
                <div class="col-12">
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <a href="javascript:history.back()" class="btn btn-outline-dark rounded-circle d-flex align-items-center justify-content-center" style="width:44px;height:44px;" data-bs-toggle="tooltip" title="Volver a la cartelera">&larr;</a>
                        <h2 class="mb-0 fw-bold">Seleccionar Asientos</h2>
                    </div>
                    <div class="d-flex flex-wrap gap-3 text-muted small" id="movie-info">
                        <span class="text-muted">Cargando informaci&oacute;n...</span>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-lg-9 mb-4">
                    <div class="cinema-room p-4">
                        <div class="screen mb-4">
                            <div class="screen-curve"></div>
                            <span>PANTALLA</span>
                        </div>
                        <div class="seats-wrapper">
                            <div class="seats-grid" id="seats-grid"></div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-3">
                        <div class="card shadow-sm border-0 sticky-lg-top" style="top:100px;">
                        <div class="card-header bg-black text-warning fw-bold py-3 d-flex align-items-center justify-content-between">
                            <span>Tu Selecci&oacute;n</span>
                            <span id="timer-display" class="badge bg-warning text-dark ms-2" title="Tiempo restante para confirmar">10:00</span>
                        </div>
                        <div class="card-body">
                            <div class="row row-cols-2 g-1 mb-4 text-center">
                                <div>
                                    <div class="seat-legend available mx-auto"></div>
                                    <small class="text-muted">Disponible</small>
                                </div>
                                <div>
                                    <div class="seat-legend occupied mx-auto"></div>
                                    <small class="text-muted">Ocupado</small>
                                </div>
                                <div>
                                    <div class="seat-legend maintenance mx-auto"></div>
                                    <small class="text-muted">Mantenimiento</small>
                                </div>
                                <div>
                                    <div class="seat-legend selected mx-auto"></div>
                                    <small class="text-muted">Seleccionado</small>
                                </div>
                            </div>
                            <hr>
                            <h6 class="fw-bold mb-2">Asientos:
                                <span id="selected-count" class="badge bg-warning text-dark ms-1">0</span>
                            </h6>
                            <div id="selected-seats" class="mb-3 small">
                                <span class="text-muted">Ninguno seleccionado</span>
                            </div>
                            <hr>
                            <h6 class="fw-bold mb-3">
                                Comida
                                <button class="btn btn-sm btn-outline-warning float-end py-0" type="button" data-bs-toggle="collapse" data-bs-target="#foodSection" aria-expanded="false" title="A\u00F1adir comida al pedido">
                                    +
                                </button>
                            </h6>
                            <div class="collapse" id="foodSection">
                                <div id="food-items" class="mb-3"></div>
                            </div>
                            <div class="d-flex justify-content-between fw-bold fs-5 mb-3 pt-2 border-top border-light">
                                <span>Total:</span>
                                <span class="text-warning">$<span id="total-price">0</span></span>
                            </div>
                            <button id="confirm-btn" class="btn btn-warning w-100 fw-bold py-2" disabled>
                                Confirmar Selecci&oacute;n
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="assets/js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetch('includes/header.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('header-placeholder').innerHTML = data;
                    setActiveNavLink();
                })
                .catch(error => console.error('Error cargando header:', error));

             fetch('includes/footer.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('footer-placeholder').innerHTML = data;
                })
                .catch(error => console.error('Error cargando footer:', error));
        });
    </script>
    <script src="assets/js/asientos.js"></script>
<script src="assets/js/utils.js"></script><script src="assets/js/header-auth.js"></script><script src="assets/js/darkmode.js"></script></body>
</html>
