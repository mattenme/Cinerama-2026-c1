<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinerama | Mi Perfil</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="shortcut icon" href="assets/img/C_ine.ico" type="image/x-icon">
    <style>
        .avatar-img { width: 120px; height: 120px; object-fit: cover; border-radius: 50%; border: 4px solid var(--cine-yellow); }
        .perfil-header { background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 16px; padding: 32px; }
        .perfil-header h1, .perfil-header p { color: #fff; }
        .stat-card { border-radius: 12px; padding: 20px; text-align: center; }
        .historial-card { border-radius: 12px; overflow: hidden; }
        .historial-card .card-header { font-weight: 600; }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div id="header-placeholder"></div>
    <div id="perfil-layout">
        <div id="sidebar-placeholder"></div>
        <div id="perfil-content">
            <main class="container my-5">
                <div id="perfil-container">
                    <div class="text-center py-5 text-muted">Cargando perfil...</div>
                </div>
            </main>
        </div>
    </div>
    <div id="footer-placeholder"></div>
    <script src="assets/js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/perfil.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (!localStorage.getItem('clienteId')) { window.location.href = 'login.html'; return; }
            fetch('includes/header.html').then(r => r.text()).then(d => { document.getElementById('header-placeholder').innerHTML = d; setActiveNavLink(); }).catch(()=>{});
            if (localStorage.getItem('clienteRol') === 'admin') {
                document.getElementById('perfil-layout').className = 'admin-layout';
                document.getElementById('perfil-content').className = 'admin-content';
                document.getElementById('footer-placeholder').style.display = 'none';
                fetch('admin/includes/sidebar.html').then(r => r.text()).then(function(d) {
                    var div = document.createElement('div');
                    div.innerHTML = d;
                    div.querySelectorAll('a[href]').forEach(function(a) {
                        var h = a.getAttribute('href');
                        if (a.closest('.sidebar-nav') && h && !h.startsWith('#') && !h.startsWith('http')) {
                            a.setAttribute('href', 'admin/' + h);
                        } else if (h && h.startsWith('../')) {
                            a.setAttribute('href', h.replace('../', ''));
                        }
                    });
                    div.querySelectorAll('img[src]').forEach(function(img) {
                        var s = img.getAttribute('src');
                        if (s && s.startsWith('../')) {
                            img.setAttribute('src', s.replace('../', ''));
                        }
                    });
                    document.getElementById('sidebar-placeholder').innerHTML = div.innerHTML;
                    var page = window.location.pathname.split('/').pop().replace('.html', '');
                    document.querySelectorAll('.nav-item[data-page="' + page + '"]').forEach(function(el) { el.classList.add('active'); });
                }).catch(()=>{});
            } else {
                fetch('includes/footer.html').then(r => r.text()).then(d => { document.getElementById('footer-placeholder').innerHTML = d; }).catch(()=>{});
            }
        });
    </script>
<script src="assets/js/utils.js"></script><script src="assets/js/header-auth.js"></script><script src="assets/js/darkmode.js"></script></body>
</html>
