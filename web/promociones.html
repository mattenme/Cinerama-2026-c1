<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinerama | Promociones</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="shortcut icon" href="assets/img/C_ine.ico" type="image/x-icon">
    <style>
        .promo-card { cursor: pointer; transition: all .25s; position: relative; overflow: hidden; }
        .promo-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.12) !important; }
        .promo-code { background: #1a1a2e; border-radius: 8px; padding: 8px 12px; display: none; align-items: center; justify-content: space-between; margin-top: 10px; }
        .promo-code.revealed { display: flex; }
        .promo-code code { color: var(--cine-yellow); font-size: .9rem; font-weight: bold; letter-spacing: 2px; user-select: all; }
        .copy-btn { background: none; border: 1px solid rgba(255,255,255,.2); color: #fff; border-radius: 6px; padding: 2px 10px; font-size: .8rem; cursor: pointer; transition: all .2s; }
        .copy-btn:hover { background: var(--cine-yellow); color: #000; border-color: var(--cine-yellow); }
        .copy-btn.copied { background: #28a745; border-color: #28a745; }
        .promo-click-hint { font-size: .75rem; color: var(--text-muted); display: block; margin-top: 6px; }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="container my-5">
        <h2 class="text-center mb-5 display-5 fw-bold">Promociones y Ofertas</h2>
        <p class="text-center text-muted mb-5">Toca una promoci&oacute;n para revelar su c&oacute;digo de descuento</p>
        <div class="row g-4" id="promo-grid"></div>
        <div id="promo-empty" class="text-center text-muted py-5 d-none">
            <i class="bi bi-ticket-perforated display-1"></i>
            <p class="mt-3 fs-5">No hay promociones disponibles en este momento</p>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="assets/js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            Promise.all([
                fetch('includes/header.html').then(function(r) { return r.text(); }).then(function(d) {
                    document.getElementById('header-placeholder').innerHTML = d;
                    setActiveNavLink();
                }),
                fetch('includes/footer.html').then(function(r) { return r.text(); }).then(function(d) {
                    document.getElementById('footer-placeholder').innerHTML = d;
                }),
                fetch(API_URL + '/PromocionController').then(function(r) { return r.json(); }).then(function(lista) {
                    var grid = document.getElementById('promo-grid');
                    var empty = document.getElementById('promo-empty');
                    if (!lista || lista.length === 0) {
                        grid.classList.add('d-none');
                        empty.classList.remove('d-none');
                        return;
                    }
                    grid.innerHTML = lista.filter(function(p) { return p.activo == 1; }).map(function(p) {
                        var descuento = p.descuento + '% Descuento';
                        var badge = '<span class="text-success fw-bold small">V\u00e1lido</span>';
                        return '<div class="col-md-6 col-lg-3 promo-card-wrapper" data-codigo="' + p.codigo + '" data-descuento="' + p.descuento + '">' +
                            '<div class="card border-0 shadow-sm h-100 promo-card" style="border-left: 5px solid #ffcc00 !important;">' +
                                '<div class="card-body text-center">' +
                                    '<h3 class="card-title h5">' + p.codigo + '</h3>' +
                                    '<p class="promo-discount display-6 fw-bold text-warning my-3">' + descuento + '</p>' +
                                    '<p class="card-text text-muted">' + (p.descripcion || '') + '</p>' +
                                    badge +
                                    '<div class="promo-code">' +
                                        '<code>' + p.codigo + '</code>' +
                                        '<button class="copy-btn" onclick="copiarCodigo(this,\'' + p.codigo + '\')"><i class="bi bi-clipboard"></i> Copiar</button>' +
                                    '</div>' +
                                    '<span class="promo-click-hint">Toca para ver c\u00f3digo</span>' +
                                '</div>' +
                            '</div>' +
                        '</div>';
                    }).join('');
                }).catch(function() {
                    document.getElementById('promo-grid').innerHTML = '<div class="col-12 text-center text-muted py-5">Error al cargar promociones</div>';
                })
            ]).catch(function(e) { console.error('Error:', e); });

            document.getElementById('promo-grid').addEventListener('click', function(e) {
                var wrapper = e.target.closest('.promo-card-wrapper');
                if (!wrapper) return;
                var codeDiv = wrapper.querySelector('.promo-code');
                var hint = wrapper.querySelector('.promo-click-hint');
                if (codeDiv) {
                    var wasRevealed = codeDiv.classList.contains('revealed');
                    codeDiv.classList.toggle('revealed');
                    if (hint) hint.textContent = wasRevealed ? 'Toca para ver c\u00f3digo' : 'C\u00f3digo revelado';
                }
            });
        });

        function copiarCodigo(btn, codigo) {
            navigator.clipboard.writeText(codigo).then(function() {
                btn.innerHTML = '<i class="bi bi-check-lg"></i> Copiado';
                btn.classList.add('copied');
                setTimeout(function() {
                    btn.innerHTML = '<i class="bi bi-clipboard"></i> Copiar';
                    btn.classList.remove('copied');
                }, 2000);
            }).catch(function() {
                alert('No se pudo copiar. C\u00f3digo: ' + codigo);
            });
        }
    </script>
<script src="assets/js/utils.js"></script><script src="assets/js/header-auth.js"></script><script src="assets/js/darkmode.js"></script></body>
</html>
