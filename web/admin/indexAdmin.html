<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinerama | Panel de Administración</title>
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .admin-card { transition: transform .2s, box-shadow .2s; cursor: pointer; }
        .admin-card:hover { transform: translateY(-4px); box-shadow: 0 .5rem 1rem rgba(0,0,0,.15)!important; }
        .admin-icon { font-size: 2.5rem; width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; border-radius: 12px; }

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<body>
    <div id="header-placeholder"></div>
    <div class="admin-layout">
        <div id="sidebar-placeholder"></div>
        <div class="admin-content">
            <main>
                <div class="container my-5">
                <div class="text-center mb-5">
                    <h1 class="display-5 fw-bold">Panel de Administración</h1>
                    <p class="lead text-muted">Gestiona películas, horarios, salas, asientos y más.</p>
                </div>

                <div class="row g-4" id="dashboard-cards"></div>
            </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
