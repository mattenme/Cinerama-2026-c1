<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinerama | Gestión de Películas</title>
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" href="../assets/img/C_ine.ico" type="image/x-icon">
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="admin-layout">
        <div id="sidebar-placeholder"></div>
        <div class="admin-content">
            <main>
                <div class="container my-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="fw-bold mb-0">Gestión de Películas</h1>
                    <button class="btn btn-warning fw-bold" onclick="mostrarFormulario()">+ Nueva Película</button>
                </div>

                <div id="formulario-pelicula" class="card p-4 mb-4 bg-light border-0 d-none">
                    <h3 class="mb-3" id="form-titulo">Nueva Película</h3>
                    <form onsubmit="guardarPelicula(event)">
                        <div class="row g-3">
                            <div class="col-12">
                                <label for="titulo" class="form-label fw-semibold">Título:</label>
                                <input type="text" class="form-control" id="titulo" name="titulo" required>
                            </div>
                            <div class="col-6">
                                <label for="duracion_minutos" class="form-label fw-semibold">Duración (minutos):</label>
                                <input type="number" class="form-control" id="duracion_minutos" name="duracion_minutos" min="30" max="300" required>
                            </div>
                            <div class="col-6">
                                <label for="genero" class="form-label fw-semibold">Género:</label>
                                <input type="text" class="form-control" id="genero" name="genero" placeholder="Ej: Acción, Drama">
                            </div>
                            <div class="col-12">
                                <label for="sinopsis" class="form-label fw-semibold">Sinopsis:</label>
                                <textarea class="form-control" id="sinopsis" name="sinopsis" rows="3" placeholder="Breve descripción de la película"></textarea>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-semibold">Imagen:</label>
                                <input type="file" class="form-control mb-2" id="imagen" name="imagen" accept="image/*">
                                <input type="url" class="form-control" id="imagen_url" name="imagen_url" placeholder="O pega una URL (https://...)">
                            </div>
                            <div class="col-6 d-flex align-items-end">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="destacado" value="1">
                                    <label class="form-check-label fw-semibold" for="destacado">Mostrar en p&aacute;gina principal</label>
                                </div>
                            </div>

                        </div>
                        <div class="mt-3 d-flex gap-2">
                            <button type="submit" class="btn btn-success" id="btn-guardar">Guardar</button>
                            <button type="button" class="btn btn-secondary" onclick="ocultarFormulario()">Cancelar</button>
                        </div>
                    </form>
                </div>

                <div class="mb-3">
                    <input type="text" class="form-control" placeholder="Buscar en esta lista..." id="buscador" onkeyup="filtrarTabla()">
                </div>

                <div class="table-responsive table-card">
                    <table class="table table-striped table-hover align-middle" id="tabla-peliculas">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Imagen</th>
                                <th>Título</th>
                                <th>Duración</th>
                                <th>Género</th>
                                <th>Inicio</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="7" class="text-center text-muted">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/admin.js"></script>
    <script src="../assets/js/admin/peliculas.js"></script>
    <script src="../assets/js/utils.js"></script><script src="../assets/js/header-auth.js"></script><script src="../assets/js/darkmode.js"></script></body>
</html>
