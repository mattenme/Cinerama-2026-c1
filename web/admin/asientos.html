<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinerama | Gestión de Asientos</title>
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        .seat-admin { width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; border-radius: 4px; margin: 2px; font-size: .6rem; font-weight: bold; cursor: pointer; border: 2px solid transparent; transition: all .15s; }
        .seat-admin.disponible { background: #28a745; color: #fff; }
        .seat-admin.vendida { background: #dc3545; color: #fff; cursor: not-allowed; }
        .seat-admin.mantenimiento { background: #0d6efd; color: #fff; cursor: not-allowed; }
        .seat-admin.seleccionada { background: #ffc107; color: #000; }
        .seat-admin:not(.vendida):not(.mantenimiento):hover { transform: scale(1.1); }
        .seat-admin.seleccionado { border-color: #000; box-shadow: 0 0 0 2px #fff, 0 0 0 4px #000; }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" href="../assets/img/C_ine.ico" type="image/x-icon">
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="admin-layout">
        <div id="sidebar-placeholder"></div>
        <div class="admin-content">
            <main>
                <div class="container my-5">
                <h1 class="fw-bold mb-4">Gestión de Asientos</h1>

                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Sala:</label>
                        <div class="d-flex gap-2">
                            <select class="form-select" id="sala-select" onchange="cargarAsientos()">
                                <option value="">Seleccionar sala</option>
                            </select>
                            <button class="btn btn-sm btn-outline-primary" id="btn-editar-sala" onclick="editarSalaActual()" title="Editar sala" style="display:none;"><i class="bi bi-pencil"></i></button>
                            <button class="btn btn-sm btn-outline-danger" id="btn-eliminar-sala" onclick="eliminarSalaActual()" title="Eliminar sala" style="display:none;"><i class="bi bi-trash"></i></button>
                        </div>
                    </div>
                    <div class="col-md-4 d-flex align-items-end gap-1">
                        <button class="btn btn-success w-100" onclick="mostrarAgregar()">+ Agregar Asiento</button>
                        <button class="btn btn-info w-100" onclick="generarAutomatico()">Generar 100</button>
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <span class="text-muted small">Genera filas A-J, asientos 1-10</span>
                    </div>
                </div>

                <div id="form-agregar" class="card p-3 mb-4 bg-light border-0 d-none">
                    <h5 class="mb-3">Nuevo Asiento</h5>
                    <form onsubmit="guardarAsiento(event)" class="row g-2">
                        <div class="col-auto">
                            <input type="text" class="form-control" id="fila" placeholder="Fila (ej: A)" maxlength="2" required>
                        </div>
                        <div class="col-auto">
                            <input type="number" class="form-control" id="numero" placeholder="Número" min="1" required>
                        </div>
                        <div class="col-auto">
                            <button type="submit" class="btn btn-success">Guardar</button>
                            <button type="button" class="btn btn-secondary" onclick="document.getElementById('form-agregar').classList.add('d-none')">Cancelar</button>
                        </div>
                    </form>
                </div>

                <div id="seat-container" class="p-4 border rounded bg-light">
                    <div class="text-center text-muted py-5">Selecciona una sala para ver sus asientos</div>
                </div>
            </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/admin.js"></script>
    <script src="../assets/js/admin/asientos.js"></script>
    <script src="../assets/js/utils.js"></script><script src="../assets/js/header-auth.js"></script><script src="../assets/js/darkmode.js"></script></body>
</html>
