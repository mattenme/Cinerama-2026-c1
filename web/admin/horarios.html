<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinerama | Gestión de Horarios</title>
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" href="../assets/img/C_ine.ico" type="image/x-icon">
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="admin-layout">
        <div id="sidebar-placeholder"></div>
        <div class="admin-content">
            <main>
                <div class="container my-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h1 class="fw-bold mb-0">Gestión de Horarios</h1>
                        <div id="filtro-info" class="text-muted small mt-1"></div>
                    </div>
                    <button class="btn btn-warning fw-bold" onclick="mostrarFormulario()">+ Nuevo Horario</button>
                </div>

                <div id="formulario-horario" class="card p-4 mb-4 bg-light border-0 d-none">
                    <h3 class="mb-3" id="form-titulo">Nuevo Horario</h3>
                    <form onsubmit="guardarHorario(event)">
                        <input type="hidden" id="edit-id" value="">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="id_pelicula" class="form-label fw-semibold">Película:</label>
                                <select class="form-select" id="id_pelicula" name="id_pelicula" required>
                                    <option value="">Seleccionar película</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="id_sala" class="form-label fw-semibold">Sala:</label>
                                <select class="form-select" id="id_sala" name="id_sala" required>
                                    <option value="">Seleccionar sala</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="hora_inicio" class="form-label fw-semibold">Fecha y Hora:</label>
                                <input type="datetime-local" class="form-control" id="hora_inicio" name="hora_inicio" required>
                            </div>
                            <div class="col-md-6">
                                <label for="estado" class="form-label fw-semibold">Estado:</label>
                                <select class="form-select" id="estado" name="estado" required>
                                    <option value="Programada">Programada</option>
                                    <option value="En curso">En curso</option>
                                    <option value="Finalizada">Finalizada</option>
                                    <option value="Cancelada">Cancelada</option>
                                </select>
                            </div>
                        </div>
                        <div class="mt-3 d-flex gap-2">
                            <button type="submit" class="btn btn-success" id="btn-guardar">Guardar</button>
                            <button type="button" class="btn btn-secondary" onclick="ocultarFormulario()">Cancelar</button>
                        </div>
                    </form>
                </div>

                <div class="mb-3">
                    <input type="text" class="form-control" placeholder="Buscar en esta lista..." id="buscador" onkeyup="filtrarTabla()">
                </div>

                <div class="table-responsive table-card">
                    <table class="table table-striped table-hover align-middle" id="tabla-horarios">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Película</th>
                                <th>Sala</th>
                                <th>Fecha y Hora</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="6" class="text-center text-muted">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/admin.js"></script>
    <script src="../assets/js/admin/horarios.js"></script>
    <script src="../assets/js/utils.js"></script><script src="../assets/js/header-auth.js"></script><script src="../assets/js/darkmode.js"></script></body>
</html>
