<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinerama | Calificaciones</title>
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" href="../assets/img/C_ine.ico" type="image/x-icon">
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="admin-layout">
        <div id="sidebar-placeholder"></div>
        <div class="admin-content">
            <main>
                <div class="container my-5">
                <h1 class="fw-bold mb-4">Calificaciones</h1>

                <div class="mb-3">
                    <input type="text" class="form-control" placeholder="Buscar en esta lista..." id="buscador" onkeyup="filtrarTabla()">
                </div>

                <div class="table-responsive table-card">
                    <table class="table table-striped table-hover align-middle" id="tabla-calificaciones">
                        <thead class="table-dark">
                            <tr>
                                <th>Cliente</th>
                                <th>Película</th>
                                <th>Puntuación</th>
                                <th>Fecha</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="5" class="text-center text-muted">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/admin.js"></script>
    <script src="../assets/js/admin/calificaciones.js"></script>
    <script src="../assets/js/utils.js"></script><script src="../assets/js/header-auth.js"></script><script src="../assets/js/darkmode.js"></script></body>
</html>
