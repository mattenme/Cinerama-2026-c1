<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinerama | Productos</title>
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" href="../assets/img/C_ine.ico" type="image/x-icon">
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="admin-layout">
        <div id="sidebar-placeholder"></div>
        <div class="admin-content">
            <main>
                <div class="container my-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="fw-bold mb-0">Gesti&oacute;n de Productos</h1>
                    <button class="btn btn-warning fw-bold" onclick="mostrarFormulario()">+ Nuevo Producto</button>
                </div>

                <div id="formulario" class="card p-4 mb-4 bg-light border-0 d-none">
                    <h3 class="mb-3" id="form-titulo">Nuevo Producto</h3>
                    <form onsubmit="guardar(event)">
                        <input type="hidden" id="edit-id" value="">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Nombre:</label>
                                <input type="text" class="form-control" id="nombre" name="nombre" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Precio (S/):</label>
                                <input type="number" step="0.01" class="form-control" id="precio" name="precio" min="0" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-semibold">Categor&iacute;a:</label>
                                <select class="form-select" id="categoria" required>
                                    <option value="Comida">Comida</option>
                                    <option value="Bebida">Bebida</option>
                                    <option value="Combo">Combo</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-semibold">Descripci&oacute;n:</label>
                                <textarea class="form-control" id="descripcion" rows="2"></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Imagen:</label>
                                <input type="file" class="form-control mb-2" id="imagen" accept="image/*">
                                <input type="url" class="form-control" id="imagen_url" placeholder="O pega una URL (https://...)">
                            </div>
                            <div class="col-md-6 d-flex align-items-end pb-2">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="activo" checked>
                                    <label class="form-check-label fw-semibold" for="activo">Activo</label>
                                </div>
                            </div>
                        </div>
                        <div class="mt-3 d-flex gap-2">
                            <button type="submit" class="btn btn-success" id="btn-guardar">Guardar</button>
                            <button type="button" class="btn btn-secondary" onclick="ocultarFormulario()">Cancelar</button>
                        </div>
                    </form>
                </div>

                <div class="mb-3">
                    <input type="text" class="form-control" placeholder="Buscar en esta lista..." id="buscador" onkeyup="filtrarTabla()">
                </div>

                <div class="table-responsive table-card">
                    <table class="table table-striped table-hover align-middle" id="tabla">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Imagen</th>
                                <th>Nombre</th>
                                <th>Descripci&oacute;n</th>
                                <th>Precio</th>
                                <th>Categor&iacute;a</th>
                                <th>Activo</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="8" class="text-center text-muted">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/admin.js"></script>
    <script src="../assets/js/admin/productos.js"></script>
    <script src="../assets/js/utils.js"></script><script src="../assets/js/header-auth.js"></script><script src="../assets/js/darkmode.js"></script></body>
</html>
