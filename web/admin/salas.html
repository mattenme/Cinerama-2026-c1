<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinerama | Gestión de Salas</title>
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" href="../assets/img/C_ine.ico" type="image/x-icon">
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="admin-layout">
        <div id="sidebar-placeholder"></div>
        <div class="admin-content">
            <main>
                <div class="container my-5">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="fw-bold mb-0">Gestión de Salas</h1>
                    <button class="btn btn-warning fw-bold" onclick="mostrarFormulario()">+ Nueva Sala</button>
                </div>

                <div id="formulario-sala" class="card p-4 mb-4 bg-light border-0 d-none">
                    <h3 class="mb-3" id="form-titulo">Nueva Sala</h3>
                    <form onsubmit="guardarSala(event)">
                        <div class="row g-3">
                            <div class="col-12">
                                <label for="nombre" class="form-label fw-semibold">Nombre de Sala:</label>
                                <input type="text" class="form-control" id="nombre" name="nombre" required>
                            </div>
                            <div class="col-md-6">
                                <label for="tipo" class="form-label fw-semibold">Tipo de Sala:</label>
                                <select class="form-select" id="tipo" name="tipo" required>
                                    <option value="">Seleccionar tipo</option>
                                    <option value="2d">2D</option>
                                    <option value="3d">3D</option>
                                    <option value="imax">IMAX</option>
                                    <option value="vip">VIP</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="capacidad_total" class="form-label fw-semibold">Capacidad:</label>
                                <input type="number" class="form-control" id="capacidad_total" name="capacidad_total" min="20" max="500" required>
                            </div>
                        </div>
                        <div class="mt-3 d-flex gap-2">
                            <button type="submit" class="btn btn-success" id="btn-guardar">Guardar</button>
                            <button type="button" class="btn btn-secondary" onclick="ocultarFormulario()">Cancelar</button>
                        </div>
                    </form>
                </div>

                <div class="mb-3">
                    <input type="text" class="form-control" placeholder="Buscar en esta lista..." id="buscador" onkeyup="filtrarTabla()">
                </div>

                <div class="table-responsive table-card">
                    <table class="table table-striped table-hover align-middle" id="tabla-salas">
                        <thead class="table-dark">
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Capacidad</th>
                                <th>Tipo</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="5" class="text-center text-muted">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/admin.js"></script>
    <script src="../assets/js/admin/salas.js"></script>
    <script src="../assets/js/utils.js"></script><script src="../assets/js/header-auth.js"></script><script src="../assets/js/darkmode.js"></script></body>
</html>
