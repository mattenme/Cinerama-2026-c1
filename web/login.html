<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinerama | Login</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="shortcut icon" href="assets/img/C_ine.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <main>
        <section class="d-flex justify-content-center align-items-center" style="min-height: 60vh;">
            <div class="card shadow-sm border-0 p-4" style="max-width: 400px; width: 100%;">
                <h2 class="text-center mb-4 fw-bold">Iniciar Sesi&oacute;n</h2>
                <form id="login-form">
                    <div class="mb-3">
                        <label for="dni" class="form-label fw-semibold">DNI</label>
                        <input type="text" class="form-control" id="dni" name="dni" maxlength="8" required>
                    </div>
                    <div class="mb-3">
                        <label for="nombre" class="form-label fw-semibold">Nombre Completo</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 fw-bold py-2">Iniciar Sesi&oacute;n</button>
                </form>
                <p class="text-center mt-3 mb-0">&iquest;No tienes cuenta? <a href="registrarse.html" class="text-danger">Reg&iacute;strate aqu&iacute;</a></p>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetch('includes/header.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('header-placeholder').innerHTML = data;
                    setActiveNavLink();
                })
                .catch(error => console.error('Error cargando header:', error));

            fetch('includes/footer.html')
                .then(response => response.text())
                .then(data => {
                    document.getElementById('footer-placeholder').innerHTML = data;
                })
                .catch(error => console.error('Error cargando footer:', error));
        });

        function setActiveNavLink() {
            var path = window.location.pathname;
            document.querySelectorAll('.navbar-nav .nav-link').forEach(function(link) {
                link.classList.remove('active');
                if (link.getAttribute('href') === path || (path === '/Cinerama_1/' && link.getAttribute('href') === '/Cinerama_1/index.html')) link.classList.add('active');
            });
        }
    </script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/login.js"></script>
<script src="assets/js/utils.js"></script><script src="assets/js/header-auth.js"></script><script src="assets/js/darkmode.js"></script></body>
</html>
